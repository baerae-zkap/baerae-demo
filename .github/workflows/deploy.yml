name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build landing
        working-directory: landing
        run: npm install && npm run build

      - name: Build gyeonggi-civic-wallet
        working-directory: demos/gyeonggi-civic-wallet
        run: npm install && npm run build

      - name: Build zkap-app
        working-directory: demos/zkap-app
        run: npm install && npm run build

      - name: Assemble dist
        run: |
          mkdir -p dist/baerae-demo
          cp -R landing/out/* dist/baerae-demo/
          mkdir -p dist/gyeonggi-civic-wallet-demo
          cp -R demos/gyeonggi-civic-wallet/out/* dist/gyeonggi-civic-wallet-demo/
          mkdir -p dist/zkap-app
          cp -R demos/zkap-app/out/* dist/zkap-app/

          # Redirect root to landing
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/baerae-demo/"></head><body></body></html>' > dist/index.html

          # Inject home button on demo pages
          HOME_BTN='<div id="baerae-home-btn" style="position:fixed;bottom:24px;right:24px;z-index:99999"><a href="/baerae-demo/" style="display:flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,0.65);box-shadow:0 2px 12px rgba(0,0,0,0.2);text-decoration:none;backdrop-filter:blur(8px)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a></div>'
          find dist/gyeonggi-civic-wallet-demo -name "*.html" -exec sed -i "s|</body>|${HOME_BTN}</body>|" {} +
          find dist/zkap-app -name "*.html" -exec sed -i "s|</body>|${HOME_BTN}</body>|" {} +

          # .nojekyll for GitHub Pages
          touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
